services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pe_orgair_platform_api
    ports:
      - "8000:8000"
    env_file:
      - .env  # Simpler: loads all variables from .env file
    environment:
      - REDIS_URL=redis://redis:6379/0  # Override to use Docker network
    volumes:
      - ./app:/app/app
      - ./data:/app/data  # Mount local data folder to container
      - ./chroma_data:/app/chroma_data  # Persist ChromaDB across restarts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pe_orgair_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pe_orgair_platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pe_orgair_network

# Airflow Orchestrator
  airflow:
    image: apache/airflow:2.9.3
    container_name: pe_orgair_platform_airflow
    depends_on:
      - redis
      - api
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=pe-platform-secret
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    command: >
      bash -c "airflow standalone &
               sleep 20 &&
               airflow users reset-password -u admin -p admin &&
               wait"
    restart: unless-stopped
    networks:
      - pe_orgair_networkk

networks:
  pe_orgair_network:
    driver: bridge

volumes:
  redis_data:
  airflow_data:
    name: pe_rag_airflow